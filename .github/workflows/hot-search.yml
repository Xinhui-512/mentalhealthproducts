name: Hot Search Product Ideas Analysis

on:
  schedule:
    - cron: '0 2 * * *'  # 每天北京时间 10:00 执行
  workflow_dispatch:       # 支持手动触发

jobs:
  hot-search-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests

      - name: Fetch hot search data
        run: |
          unset HTTP_PROXY HTTPS_PROXY http_proxy https_proxy
          python scripts/fetch_hot_search.py
        env:
          WEIBO_API_KEY: ${{ secrets.WEIBO_API_KEY }}
          DOUYIN_API_KEY: ${{ secrets.DOUYIN_API_KEY }}

      - name: Run AI analysis
        run: |
          unset HTTP_PROXY HTTPS_PROXY http_proxy https_proxy
          python scripts/run_claude.py
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          MINIMAX_API_URL: ${{ secrets.MINIMAX_API_URL }}

      - name: Deploy to GitHub Pages
        if: success() || failure()
        run: |
          REPORT_FILE="hot_search_report_$(date +%y%m%d).html"
          cp "$REPORT_FILE" "latest.html"

          # Create a simple index
          cat > index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
              <meta charset="UTF-8">
              <title>热搜报告</title>
              <meta http-equiv="refresh" content="0;url=latest.html">
          </head>
          <body>
              <p>正在跳转到最新报告...</p>
              <p><a href="latest.html">如果没有自动跳转，点击这里查看最新报告</a></p>
          </body>
          </html>
          EOF
        shell: bash

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages

      - name: Send to Feishu
        if: success() || failure()
        run: |
          REPORT_FILE="hot_search_report_$(date +%y%m%d).html"
          REPORT_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/$REPORT_FILE"
          echo "DEBUG: REPORT_PATH=$REPORT_FILE"
          echo "DEBUG: REPORT_URL=$REPORT_URL"
          FEISHU_WEBHOOK_URL="$FEISHU_WEBHOOK_URL" STATUS="${{ job.status }}" REPORT_PATH="$REPORT_FILE" REPORT_URL="$REPORT_URL" python scripts/send_feishu.py
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
